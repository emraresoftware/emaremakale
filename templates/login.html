{% extends "base.html" %}
{% block title %}Giriş Yap — Makale Üretici{% endblock %}

{% block content %}
<section class="py-16 lg:py-24 min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-brand-50/30">
    <div class="max-w-md w-full mx-auto px-4">
        
        <!-- Login Card -->
        <div class="bg-white rounded-3xl p-8 lg:p-10 border border-gray-100 shadow-2xl shadow-gray-200/50">
            
            <!-- Logo & Başlık -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-lg shadow-brand-500/30 mx-auto mb-4">
                    <i class="fas fa-user-circle text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Giriş Yap</h1>
                <p class="text-gray-500">Makale üretmeye devam edin</p>
            </div>

            <!-- Form -->
            <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
                
                <!-- Kullanıcı Adı -->
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-user text-brand-500 mr-1.5"></i> Kullanıcı Adı
                    </label>
                    <input type="text" id="username" name="username" required autofocus
                           placeholder="kullaniciadi"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all duration-300 text-gray-800 placeholder-gray-400">
                </div>

                <!-- Şifre -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-lock text-brand-500 mr-1.5"></i> Şifre
                    </label>
                    <input type="password" id="password" name="password" required
                           placeholder="••••••••"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all duration-300 text-gray-800 placeholder-gray-400">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        class="w-full px-8 py-4 rounded-xl bg-gradient-to-r from-brand-500 to-purple-600 text-white font-semibold text-lg shadow-lg shadow-brand-500/30 hover:shadow-brand-500/50 hover:scale-[1.02] transition-all duration-300">
                    <i class="fas fa-sign-in-alt mr-2"></i> Giriş Yap
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500">veya</span>
                </div>
            </div>

            <!-- Register Link -->
            <div class="text-center">
                <p class="text-gray-600 text-sm">
                    Hesabınız yok mu?
                    <a href="{{ url_for('register') }}" 
                       class="font-semibold text-brand-600 hover:text-brand-700 transition-colors">
                        Hemen Kayıt Olun
                    </a>
                </p>
            </div>

        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="{{ url_for('index') }}" 
               class="text-sm text-gray-500 hover:text-brand-600 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Ana Sayfaya Dön
            </a>
        </div>

    </div>
</section>
{% endblock %}
